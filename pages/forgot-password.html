<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWUFE 车辆管理系统 - 忘记密码</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>找回密码</h1>
                <p>西南财经大学校园车辆管理系统</p>
            </div>

            <form id="forgotForm" class="login-form">
                <div class="form-group">
                    <label for="phone">手机号码</label>
                    <input type="tel" id="phone" placeholder="请输入注册手机号" required>
                </div>

                <div class="form-group">
                    <label for="idCard">身份证号</label>
                    <input type="text" id="idCard" placeholder="用于身份验证" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" placeholder="至少6位字符" minlength="6" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input type="password" id="confirmPassword" placeholder="再次输入新密码" required>
                </div>

                <button type="submit" class="btn-login">重置密码</button>

                <div class="form-footer">
                    <p>想起密码了？<a href="../index.html" class="register-link">返回登录</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/auth-utils.js"></script>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
